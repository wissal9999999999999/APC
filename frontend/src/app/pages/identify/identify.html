<div class="container">
  <div class="topbar">
    <div class="brand">
      <div class="logo">AI</div>
      <div>
        <h1>Identification des AAD</h1>
        <p>Dépose un cours (PDF) puis lance l’identification.</p>
      </div>
    </div>
    <span class="badge">v0.1 • Identify</span>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="section-title">Téléverser un cours</div>

      <input
        class="input"
        type="file"
        accept="application/pdf"
        (change)="onFileChange($event)"
      />

      <div style="margin-top: 12px;">
        <button class="btn btn-primary" (click)="identify()" [disabled]="loading">
          {{ loading ? 'Analyse...' : 'Identifier les AAD' }}
        </button>

        <button class="btn" style="margin-left: 10px;" (click)="back()" [disabled]="loading">
          Retour
        </button>
      </div>

      <p class="hint" *ngIf="error">{{ error }}</p>

      <div *ngIf="aads.length > 0">
        <div class="results-head">
          <div class="section-title">AAD identifiés</div>
          <span class="pill">{{ aads.length }} trouvés</span>
        </div>

        <div class="grid">
          <div class="item" *ngFor="let item of aads">
            <div>
              <p class="item-title">{{ item.text }}</p>
              <p class="item-sub">Extrait automatiquement du cours.</p>
            </div>
          </div>
        </div>
      </div>

      <div class="empty" *ngIf="!loading && aads.length === 0 && file && !error">
        Aucun résultat pour l’instant.
      </div>
    </div>
  </div>
</div>
